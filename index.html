<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>
      Opung AI
    </title>
    <!-- Import Font Syncopate untuk vibe Retroica & JetBrains Mono untuk Kode -->
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
  --bg0: #000000;
  --bg1: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --bd0: rgba(255,255,255,0.08);
  --bd1: rgba(255,255,255,0.20);
  --ac0: #ffffff;
  --ac1: #cccccc;
  --ac2: #888888;
  --tx0: #f0f0f0;
  --tx1: #b0b0b0;
  --tx2: #6a6a6a;
  --glow: 0 0 28px rgba(255,255,255,0.05);
  --btn-bg: #1a1a1a;
  --btn-border: #2a2a2a;
}
body.light {
  --bg0: #f8f9fa;
  --bg1: #ffffff;
  --bg2: #f1f3f5;
  --bg3: #e9ecef;
  --bg4: #dee2e6;
  --bd0: rgba(0,0,0,0.08);
  --bd1: rgba(0,0,0,0.15);
  --ac0: #000000;
  --ac1: #212529;
  --ac2: #495057;
  --tx0: #1a1a1a;
  --tx1: #495057;
  --tx2: #868e96;
  --glow: 0 0 28px rgba(0,0,0,0.03);
  --btn-bg: #e9ecef;
  --btn-border: #ced4da;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { 
  font-family: 'Retroica', 'Syncopate', 'Syne', sans-serif; 
  background: var(--bg0); 
  color: var(--tx0); 
  display: flex; 
  flex-direction: column; 
  position: relative; 
  overflow-x: hidden; 
  max-width: 100vw; 
  transition: background 0.3s cubic-bezier(0.16, 1, 0.3, 1), color 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
}
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:98; backdrop-filter:blur(4px); }
.overlay.show { display:block; }
.sidebar { position:fixed; top:0; left:0; bottom:0; width:270px; background:var(--bg2); border-right:1px solid var(--bd0); display:flex; flex-direction:column; z-index:99; overflow:hidden; transform:translateX(-100%); transition:transform .35s cubic-bezier(0.16, 1, 0.3, 1); box-shadow:4px 0 32px rgba(0,0,0,.3); }
.sidebar.open { transform:translateX(0); }
.s-head { padding:24px 18px 18px; border-bottom:1px solid var(--bd0); flex-shrink:0; }
.logo { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.logo-icon { width:34px; height:34px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border: 1px solid var(--bd1); background: var(--bg3); font-weight: 800; font-family: 'Syncopate', sans-serif; font-size: 16px; color: var(--ac0); }
.logo-txt { font-size:16px; font-weight:700; letter-spacing:1px; color:var(--ac0); font-family: 'Syncopate', sans-serif; }
.header-buttons { display: flex; gap: 8px; margin-bottom: 4px; }
.new-btn, .theme-toggle { padding:10px 14px; background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:10px; color:var(--ac1); font-family:'Syne',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; transition:all .25s cubic-bezier(0.16, 1, 0.3, 1); }
.new-btn:hover, .theme-toggle:hover { background:var(--bg4); border-color:var(--bd1); transform:translateY(-1px); }
.new-btn svg, .theme-toggle svg { width:13px; height:13px; flex-shrink:0; }
.s-history { flex:1; overflow-y:auto; padding:12px 12px; }
.s-history::-webkit-scrollbar { width:3px; }
.s-history::-webkit-scrollbar-thumb { background:var(--bd1); border-radius:2px; }
.s-label { font-size:9px; letter-spacing:2px; font-weight:700; color:var(--tx2); text-transform:uppercase; padding:0 4px; margin-bottom:10px; font-family: 'Syncopate', sans-serif; }
.c-item { padding:10px 12px; border-radius:8px; cursor:pointer; font-size:12px; color:var(--tx1); transition:all .2s cubic-bezier(0.16, 1, 0.3, 1); display:flex; align-items:center; gap:8px; margin-bottom:4px; font-family: 'Syne', sans-serif; }
.c-item:hover { background:var(--bg3); color:var(--tx0); }
.c-item.active { background:var(--bg3); color:var(--ac0); border-left:2px solid var(--ac0); }
.c-item svg { width:12px; height:12px; opacity:.5; flex-shrink:0; }
.c-item-text { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.c-item-del { width:18px; height:18px; border-radius:4px; border:none; background:transparent; color:var(--tx2); cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:all .2s; flex-shrink:0; font-size:12px; }
.c-item:hover .c-item-del { opacity:1; }
.c-item-del:hover { background:rgba(255,80,80,.1); color:#ff6b6b; }
.s-empty { padding:20px 10px; font-size:11px; color:var(--tx2); font-family:'JetBrains Mono',monospace; text-align:center; line-height:1.6; }
.s-foot { flex-shrink:0; padding:14px 12px; border-top:1px solid var(--bd0); }
.m-badge { display:flex; align-items:center; gap:7px; padding:8px 10px; background:var(--bg3); border:1px solid var(--bd0); border-radius:8px; font-size:10px; color:var(--tx1); font-family:'JetBrains Mono',monospace; }
.mdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; background:var(--ac0); box-shadow:0 0 7px var(--ac0); animation:pdot 2s infinite; }
@keyframes pdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
.credit { margin-top: 12px; font-size: 9px; color:var(--tx2); font-family:'JetBrains Mono',monospace; text-align:center; letter-spacing:.5px; }
.credit span { color:var(--ac0); font-weight: 600; }
.app { flex:1; display:flex; flex-direction:column; position:relative; z-index:1; overflow:hidden; min-height:0; width:100%; max-width:100%; box-sizing:border-box; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:0 14px; height:56px; flex-shrink:0; background:rgba(0,0,0,.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--bd0); position:relative; z-index:5; }
body.light .topbar { background:rgba(248,249,250,.85); }
.tb-left { display:flex; align-items:center; gap:12px; }
.tb-title { font-family: 'Syncopate', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--ac0); }
.burger { width:32px; height:32px; border-radius:8px; border:1px solid var(--bd0); background:var(--bg3); color:var(--tx1); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
.burger:hover { border-color:var(--bd1); color:var(--ac0); }
.burger svg { width:14px; height:14px; }
.ai-label { font-size:9px; font-weight:700; color:var(--ac1); padding:4px 8px; background:var(--bg3); border-radius:4px; display:inline-block; margin-bottom:6px; letter-spacing:.5px; font-family: 'Syncopate', sans-serif; }
.mode-pills { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
.mode-pill { padding:6px 12px; border-radius:20px; cursor:pointer; font-size:10px; font-weight:600; font-family:'Syncopate',sans-serif; transition:all .25s cubic-bezier(0.16, 1, 0.3, 1); border:1px solid var(--bd0); background:var(--bg3); color:var(--tx2); white-space:nowrap; letter-spacing:.5px; display:flex; align-items:center; gap:5px; }
.mode-pill:hover { border-color:var(--bd1); color:var(--ac0); }
.mode-pill.active { background:var(--ac0); border-color:var(--ac0); color:var(--bg0); }
.mode-pill svg { width:12px; height:12px; flex-shrink:0; }
.chat-scroll { flex:1; overflow-y:auto; overflow-x:hidden; padding:20px 0; scroll-behavior:smooth; min-height:0; width:100%; }
.chat-scroll::-webkit-scrollbar { width:3px; }
.chat-scroll::-webkit-scrollbar-thumb { background:var(--bd1); border-radius:2px; }
.welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100%; text-align:center; padding:20px 16px; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.w-orb-wrapper { position:relative; display:inline-block; margin-bottom:20px; width:68px; height:68px; }
.w-orb { width:68px; height:68px; border-radius:16px; display:flex; align-items:center; justify-content:center; background: var(--bg3); border: 1px solid var(--bd1); font-family: 'Syncopate', sans-serif; font-weight: 800; font-size: 28px; color: var(--ac0); box-shadow: var(--glow); }
.welcome h1 { font-family: 'Syncopate', sans-serif; font-size:24px; font-weight:800; margin-bottom:8px; letter-spacing: 2px; color: var(--ac0); }
.welcome p { color:var(--tx2); font-size:11px; margin-bottom:28px; font-family:'JetBrains Mono',monospace; }
.sug-grid { display:grid; grid-template-columns:1fr; gap:8px; width:100%; max-width:400px; }
@media (min-width: 480px) { .sug-grid { grid-template-columns: 1fr 1fr; } }
.sug-card { padding:12px 14px; background:var(--bg2); border:1px solid var(--bd0); border-radius:12px; text-align:left; cursor:pointer; transition:all .25s cubic-bezier(0.16, 1, 0.3, 1); font-size:11px; color:var(--tx1); line-height:1.4; font-family: 'Syne', sans-serif; }
.sug-card:hover { border-color:var(--bd1); background:var(--bg3); color:var(--tx0); transform:translateY(-2px); }
.sug-card strong { display:block; color:var(--ac1); font-size:9px; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; font-family: 'Syncopate', sans-serif; }
.chat-messages { display:flex; flex-direction:column; gap:0; padding:0 12px; max-width:100%; min-width:0; width:100%; box-sizing:border-box; overflow-x:hidden; }
.msg-user { display:flex; flex-direction:column; align-items:flex-end; margin-bottom:18px; animation:fadeUp .3s cubic-bezier(0.16, 1, 0.3, 1); padding-right:4px; width:100%; max-width:100vw; box-sizing:border-box; overflow:hidden; }
.msg-user-row { display:flex; align-items:flex-start; gap:6px; max-width:calc(100vw - 20px); min-width:0; width:auto; justify-content:flex-end; }
.msg-user .bub { padding:12px 16px; background:var(--bg3); border:1px solid var(--bd1); border-radius:16px 4px 16px 16px; font-size:13px; line-height:1.6; color:var(--tx0); word-break:normal; overflow-wrap:break-word; white-space:pre-wrap; width:auto; max-width:min(75%,calc(100vw - 80px)); font-family: 'Syne', sans-serif; }
.msg-user .meta { font-size:9px; color:var(--tx2); font-family:'JetBrains Mono',monospace; margin-top:5px; padding-right:12px; }
.msg-ai { display:flex; flex-direction:column; align-items:flex-start; margin-bottom:18px; animation:fadeUp .3s cubic-bezier(0.16, 1, 0.3, 1); padding-left:4px; padding-right:4px; }
.msg-ai-row { display:flex; align-items:flex-start; gap:0; max-width:100%; min-width:0; width:100%; }
.msg-ai .bub { padding:14px 16px; background:var(--bg2); border:1px solid var(--bd0); border-radius:4px 16px 16px 16px; font-size:13px; line-height:1.7; color:var(--tx0); word-break:normal; overflow-wrap:break-word; max-width:100%; min-width:0; flex:1; font-family: 'Syne', sans-serif; }
.msg-ai .meta { font-size:9px; color:var(--tx2); font-family:'JetBrains Mono',monospace; margin-top:5px; display:flex; align-items:center; gap:5px; padding-left:12px; }
.typing-wrap { display:flex; flex-direction:column; align-items:flex-start; margin-bottom:18px; padding-left:12px; }
.typing-ai-name { font-size:9px; font-weight:750; color:var(--ac1); padding:4px 8px; background:var(--bg3); border-radius:4px; margin-bottom:4px; letter-spacing:.5px; font-family: 'Syncopate', sans-serif; }
.typing-bub { padding:12px 18px; background:var(--bg2); border:1px solid var(--bd0); border-radius:4px 16px 16px 16px; display:flex; gap:5px; align-items:center; }
.typing-dot { width:5px; height:5px; border-radius:50%; background:var(--ac0); animation:typingJump .8s ease-in-out infinite; }
.typing-dot:nth-child(1){animation-delay:0s}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typingJump { 0%,100%{transform:translateY(0);opacity:.3} 50%{transform:translateY(-5px);opacity:1} }
.cursor { display:inline-block; width:2px; height:1em; background:var(--ac1); margin-left:2px; animation:blink .7s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.code-block { margin:12px 0; border-radius:12px; background:#000000; border:1px solid var(--bd1); overflow:hidden; }
.code-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:rgba(255,255,255,0.03); border-bottom:1px solid var(--bd0); gap:8px; flex-wrap:wrap; }
.code-lang { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; color:var(--ac1); text-transform:uppercase; }
.code-header-right { display:flex; align-items:center; gap:6px; }
.copy-code-btn, .download-code-btn, .run-code-btn { display:flex; align-items:center; gap:6px; background:var(--bg3); border:1px solid var(--bd0); border-radius:6px; padding:6px 12px; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:500; color:var(--ac1); cursor:pointer; transition:all 0.2s ease; white-space:nowrap; }
.copy-code-btn:hover { background:var(--bg4); border-color:var(--bd1); }
.copy-code-btn.copied { background:rgba(77,255,184,0.1); border-color:#4dffb8; color:#4dffb8; }
.code-content { padding:14px 16px; margin:0; overflow-x:auto; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.6; color:#e0e0e0; white-space:pre; background:#000000; }
.code-content::-webkit-scrollbar { height:4px; }
.code-content::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:4px; }
.input-area { flex-shrink:0; padding:12px 14px 20px; background:rgba(0,0,0,.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--bd0); }
body.light .input-area { background:rgba(248,249,250,.9); }
.input-box { display:flex; align-items:center; gap:9px; background:var(--bg3); border:1px solid var(--bd0); border-radius:14px; padding:0 12px; min-height:50px; }
.input-box:focus-within { border-color:var(--bd1); box-shadow:var(--glow); }
.chat-in { flex:1; background:transparent; border:none; outline:none; color:var(--tx0); font-family:'Syne',sans-serif; font-size:14px; line-height:20px; resize:none; overflow-y:auto; padding:14px 0; min-height:20px; max-height:200px; }
.send-btn { width:38px; height:38px; border-radius:11px; background:var(--ac0); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.send-btn:disabled { opacity:.35; cursor:not-allowed; }
.send-btn svg { width:15px; height:15px; fill:var(--bg0); }
.send-btn.stop-mode { border-radius:8px; background:#ff4d4d; }
.send-btn.stop-mode svg { fill:#ffffff; }
.in-foot { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
.hint { font-size:9px; color:var(--tx2); font-family:'JetBrains Mono',monospace; }
.preview-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.82); z-index:1000; backdrop-filter:blur(10px); align-items:center; justify-content:center; }
.preview-modal.show { display:flex; }
.preview-box { width:90%; max-width:900px; height:80vh; background:var(--bg1); border:1px solid var(--bd1); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; }
.preview-hdr { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:var(--bg2); border-bottom:1px solid var(--bd0); }
.prev-close-btn { width:28px; height:28px; border-radius:7px; background:rgba(255,80,80,.1); border:1px solid rgba(255,80,80,.2); color:#ff8080; cursor:pointer; border:none; }
.preview-frame { flex:1; border:none; width:100%; background:white; }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay" onclick="closeSidebar()">
    </div>
    <div class="toast" id="toast" style="display:none;">
      ✓ Berhasil!
    </div>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="s-head">
        <div class="logo">
          <div class="logo-icon">Ω</div>
          <div class="logo-txt">OPUNG AI</div>
        </div>
        <div class="header-buttons">
          <button class="new-btn" onclick="newChat()" style="flex: 1;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Baru
          </button>
          <button class="theme-toggle" onclick="toggleTheme()">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="s-history" id="historyList">
      </div>
      <div class="s-foot">
        <div class="m-badge">
          <div class="mdot"></div>
          <span>Opung Engine v1.1</span>
        </div>
        <div class="credit">
          Opung AI · by <span>lngit22</span>
        </div>
      </div>
    </nav>

    <!-- MAIN APP -->
    <div class="app">
      <header class="topbar">
        <div class="tb-left">
          <button class="burger" onclick="openSidebar()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="7" x2="21" y2="7"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="17" x2="21" y2="17"></line>
            </svg>
          </button>
          <span class="tb-title">OPUNG AI</span>
        </div>
        <div class="tb-right" style="font-size: 10px; font-family: 'Syncopate', sans-serif; opacity: 0.6; tracking-wider: 1px;">
          SERVER SECURED
        </div>
      </header>

      <div class="chat-scroll" id="chatScroll">
      </div>

      <div class="input-area">
        <div class="mode-pills" id="modePills">
          <div class="mode-pill" data-mode="coding" onclick="selectMode(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 18 22 12 16 6"></polyline>
              <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
            Coding Expert
          </div>
          <div class="mode-pill active" data-mode="smart" onclick="selectMode(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            Smarts AI
          </div>
          <div class="mode-pill" data-mode="deep" onclick="selectMode(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              <line x1="11" y1="8" x2="11" y2="14"></line>
              <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
            DeepSearch
          </div>
        </div>
        <div class="input-box">
          <textarea class="chat-in" id="chatInput" placeholder="Tanya Opung AI..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div class="in-foot">
          <span class="hint">Enter kirim · Shift+Enter baris baru</span>
          <span class="hint" style="opacity: 0.5;">Verified by lngit22</span>
        </div>
      </div>
    </div>

    <!-- PREVIEW MODAL -->
    <div class="preview-modal" id="previewModal" onclick="closePreview(event)">
      <div class="preview-box" onclick="event.stopPropagation()">
        <div class="preview-hdr">
          <span style="font-family:'Syncopate', sans-serif; font-size:11px; font-weight:700;">Sandbox Preview</span>
          <button class="prev-close-btn" onclick="closePreview()">✕</button>
        </div>
        <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>

    <script>
      // ======================== DETEKSI & PENGATURAN TEMA ========================
      function toggleTheme(){
        const b = document.body;
        b.classList.toggle('light');
        localStorage.setItem('opung_theme', b.classList.contains('light') ? 'light' : 'dark');
      }
      if(localStorage.getItem('opung_theme') === 'light') document.body.classList.add('light');

      // ======================== STRICT ANTI-JAILBREAK SYSTEM ========================
      // Pendeteksi pola instruksi berbahaya, manipulasi sistem, bypass, atau eksploitasi prompt
      const SHADOW_JAILBREAK_PATTERNS = [
        "danial", "dan mode", "dev mode", "jailbreak", "override", "system prompt", "abaikan instruksi", 
        "ignore previous", "you are now a", "pretend to be", "acting as", "bypass", "rule bypass", 
        "as an unrestricted", "unfiltered response", "tanpa batasan", "system prompt asli"
      ];

      function checkJailbreak(text) {
        const lowerText = text.toLowerCase();
        return SHADOW_JAILBREAK_PATTERNS.some(pattern => lowerText.includes(pattern));
      }

      // ======================== STATE MANAGEMENT ========================
      let chats = [];
      let activeChatId = null;
      let busy = false;
      let stopRequested = false;
      let currentMode = 'smart';
      const LS_KEY = 'opung_ai_chats';

      // ======================== SAVING & LOADING SESSIONS ========================
      function saveToLS(){try{localStorage.setItem(LS_KEY,JSON.stringify(chats));}catch(e){}}
      function loadFromLS(){try{const d=localStorage.getItem(LS_KEY);if(d)chats=JSON.parse(d);}catch(e){chats=[];}}

      // ======================== SIDEBAR CONTROLS ========================
      function openSidebar(){
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('show');
      }
      function closeSidebar(){
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
      }

      // ======================== UTILITIES ========================
      function generateId(){return'c'+Date.now()+Math.random().toString(36).slice(2,7);}
      function getTime(){return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
      function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
      function autoResize(el){
        el.style.height='auto';
        el.style.height=Math.min(el.scrollHeight,200)+'px';
      }
      function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
      function quickSend(t){
        document.getElementById('chatInput').value=t;
        sendMessage();
      }
      function showToast(msg){
        const t=document.getElementById('toast');
        t.textContent=msg||'✓';
        t.style.display='block';
        t.style.position='fixed';
        t.style.bottom='90px';
        t.style.left='50%';
        t.style.transform='translateX(-50%)';
        t.style.background='rgba(0,0,0,0.85)';
        t.style.color='#fff';
        t.style.padding='8px 24px';
        t.style.borderRadius='30px';
        t.style.fontSize='11px';
        t.style.fontFamily='JetBrains Mono';
        t.style.zIndex='9999';
        setTimeout(()=>t.style.display='none',2000);
      }
      function selectMode(el){
        currentMode=el.dataset.mode;
        document.querySelectorAll('.mode-pill').forEach(p=>p.classList.remove('active'));
        el.classList.add('active');
      }

      // ======================== SIDEBAR RENDER ========================
      function renderHistory(){
        const el=document.getElementById('historyList');
        if(!chats.length){
          el.innerHTML='<div class="s-label">Riwayat</div><div class="s-empty">Belum ada percakapan.<br>Mulai chat baru!</div>';
          return;
        }
        let h='<div class="s-label">Riwayat</div>';
        [...chats].sort((a,b)=>b.createdAt-a.createdAt).forEach(c=>{
          const ia=c.id===activeChatId;
          h+='<div class="c-item'+(ia?' active':'')+'" onclick="loadChat(\''+c.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;opacity:.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="c-item-text">'+esc(c.title||'Percakapan baru')+'</span><button class="c-item-del" onclick="deleteChat(event,\''+c.id+'\')">✕</button></div>';
        });
        el.innerHTML=h;
      }
      function deleteChat(e,id){
        e.stopPropagation();
        chats=chats.filter(c=>c.id!==id);
        saveToLS();
        if(activeChatId===id){
          activeChatId=null;
          renderWelcome();
        }
        renderHistory();
      }
      function newChat(){
        activeChatId=null;
        renderWelcome();
        closeSidebar();
        renderHistory();
      }
      function loadChat(id){
        const chat=chats.find(c=>c.id===id);
        if(!chat)return;
        activeChatId=id;
        closeSidebar();
        renderHistory();
        renderChatMessages(chat.msgs);
        setTimeout(()=>{
          document.getElementById('chatScroll').scrollTop=document.getElementById('chatScroll').scrollHeight;
        },50);
      }
      function getActiveChat(){return chats.find(c=>c.id===activeChatId)||null;}
      function ensureActiveChat(){
        if(activeChatId&&getActiveChat())return;
        const id=generateId();
        chats.push({id,title:'',msgs:[],createdAt:Date.now()});
        activeChatId=id;
        saveToLS();
      }

      // ======================== CHAT INTERFACES ========================
      function renderWelcome(){
        document.getElementById('chatScroll').innerHTML='<div class="welcome"><div class="w-orb-wrapper"><div class="w-orb">Ω</div></div><h1>OPUNG AI</h1><p>secured environment · by lngit22</p><div class="sug-grid"><div class="sug-card" onclick="quickSend(\'Apa itu Opung AI?\')"><strong>Tentang</strong>Apa itu Opung AI?</div><div class="sug-card" onclick="quickSend(\'Bagaimana cara mengoptimalkan kodingan?\')"><strong>Coding</strong>Tips optimasi kode</div><div class="sug-card" onclick="quickSend(\'Berikan analisis prospek AI masa depan\')"><strong>Riset</strong>Analisis tren AI</div><div class="sug-card" onclick="quickSend(\'Tuliskan cerita pendek fiksi sains singkat\')"><strong>Kreativitas</strong>Eksplorasi cerita</div></div></div>';
      }
      function renderChatMessages(msgs){
        const cs=document.getElementById('chatScroll');
        if(!msgs||!msgs.length){
          renderWelcome();
          return;
        }
        cs.innerHTML='<div class="chat-messages" id="msgContainer"></div>';
        msgs.forEach(m=>{
          if(m.role==='user') appendUserBubble(m.content,m.time);
          else if(m.role==='assistant') appendAIBubble(m.content,m.time,false,m.aiName);
        });
      }
      function getContainer(){
        let c=document.getElementById('msgContainer');
        if(!c){
          document.getElementById('chatScroll').innerHTML='<div class="chat-messages" id="msgContainer"></div>';
          c=document.getElementById('msgContainer');
        }
        return c;
      }
      function appendUserBubble(text,time){
        const c=getContainer();
        const d=document.createElement('div');
        d.className='msg-user';
        d.innerHTML='<div class="msg-user-row"><div class="bub">'+esc(text).replace(/\n/g,'<br>')+'</div></div><div class="meta">'+(time||getTime())+'</div>';
        c.appendChild(d);
        smoothScroll();
      }
      function appendAIBubble(content,time,animate,aiName){
        const c=getContainer();
        const d=document.createElement('div');
        d.className='msg-ai';
        const bid='b'+Math.random().toString(36).slice(2,9);
        let label='';
        if(aiName) label='<div class="ai-label">'+esc(aiName)+'</div>';
        let bub=content ? label+renderMD(content) : label+'<span class="cursor"></span>';
        
        d.innerHTML='<div class="msg-ai-row"><div class="bub" id="'+bid+'">'+bub+'</div></div><div class="meta" id="meta-'+bid+'"'+(content?'':' style="display:none"')+'><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:9px;height:9px;opacity:.5"><polyline points="20 6 9 17 4 12"/></svg>'+(time||getTime())+'</div>';
        c.appendChild(d);
        smoothScroll();
        return bid;
      }
      function showTyping(aiName){
        const c=getContainer();
        const d=document.createElement('div');
        d.className='typing-wrap';
        d.id='typingInd';
        let nh='';
        if(aiName) nh='<div class="typing-ai-name">'+esc(aiName)+'</div>';
        d.innerHTML=nh+'<div class="typing-bub"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        c.appendChild(d);
        scrollBottom();
      }
      function hideTyping(){
        const t=document.getElementById('typingInd');
        if(t) t.remove();
      }
      
      let isUserScrolledUp=false;
      document.getElementById('chatScroll').addEventListener('scroll',()=>{
        const cs=document.getElementById('chatScroll');
        isUserScrolledUp=(cs.scrollHeight-cs.scrollTop-cs.clientHeight)>80;
      });
      function scrollBottom(){
        if(!isUserScrolledUp)document.getElementById('chatScroll').scrollTo({top:document.getElementById('chatScroll').scrollHeight,behavior:'smooth'});
      }
      function smoothScroll(){
        if(!isUserScrolledUp)document.getElementById('chatScroll').scrollTo({top:document.getElementById('chatScroll').scrollHeight,behavior:'smooth'});
      }

      // ======================== MD RENDERING SYSTEM ========================
      function makeCodeBlock(lang,code,blockId){
        return'<div class="code-block"><div class="code-header"><div class="code-header-left"><span class="code-lang">'+esc(lang)+'</span></div><div class="code-header-right"><button class="copy-code-btn" onclick="copyCodeBlock(\''+blockId+'\')">Salin</button><button class="download-code-btn" onclick="downloadCode(\''+blockId+'\',\''+esc(lang)+'\')">Unduh</button><button class="run-code-btn" onclick="runCode(\''+blockId+'\')">Run</button></div></div><pre class="code-content" id="'+blockId+'">'+esc(code)+'</pre></div>';
      }
      function renderMD(raw){
        let result='',lastIndex=0;
        const cr=/```(\w*)\n([\s\S]*?)```/g;
        let m;
        while((m=cr.exec(raw))!==null){
          if(m.index>lastIndex) result+=renderText(raw.slice(lastIndex,m.index));
          const lang=m[1]||'code',code=m[2].trim(),blockId='code_'+Math.random().toString(36).slice(2,10);
          result+=makeCodeBlock(lang,code,blockId);
          lastIndex=cr.lastIndex;
        }
        if(lastIndex<raw.length){
          const rem=raw.slice(lastIndex);
          const ob=rem.match(/```(\w*)\n([\s\S]*)$/);
          if(ob){
            const lang=ob[1]||'code',code=ob[2],blockId='code_'+Math.random().toString(36).slice(2,10);
            result+=makeCodeBlock(lang,code,blockId);
          }else{
            result+=renderText(rem);
          }
        }
        return result;
      }
      function renderText(t){
        let text=esc(t);
        text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
        text=text.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
        text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
        text=text.replace(/\*(.+?)\*/g,'<em>$1</em>');
        text=text.replace(/^### (.+)$/gm,'<h3>$1</h3>');
        text=text.replace(/^## (.+)$/gm,'<h2>$1</h2>');
        text=text.replace(/^# (.+)$/gm,'<h1>$1</h1>');
        text=text.split(/\n\n+/).map(para=>{
          const tr=para.trim();
          if(!tr)return '';
          if(/^<[huo]/.test(tr))return tr;
          return'<p>'+tr.replace(/\n/g,'<br>')+'</p>';
        }).join('');
        return text;
      }

      window.copyCodeBlock=function(id){
        const el=document.getElementById(id);
        if(!el)return;
        navigator.clipboard.writeText(el.innerText).then(()=>{
          const btn=el.parentElement.querySelector('.copy-code-btn');
          if(btn){
            const orig=btn.innerHTML;
            btn.innerHTML='Tersalin!';
            btn.classList.add('copied');
            setTimeout(()=>{
              btn.innerHTML=orig;
              btn.classList.remove('copied');
            },1500);
          }
          showToast('Kode disalin!');
        });
      };
      window.downloadCode=function(id,lang){
        const el=document.getElementById(id);
        if(!el)return;
        const code=el.innerText;
        let ext='.txt';
        if(lang==='html')ext='.html';
        else if(lang==='css')ext='.css';
        else if(lang==='js'||lang==='javascript')ext='.js';
        else if(lang==='py'||lang==='python')ext='.py';
        const blob=new Blob([code],{type:'text/plain'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        a.download='code'+ext;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Kode diunduh!');
      };
      window.runCode=function(id){
        const el=document.getElementById(id);
        if(!el)return;
        document.getElementById('previewFrame').srcdoc=el.innerText;
        document.getElementById('previewModal').classList.add('show');
      };
      function closePreview(e){
        if(e&&e.target!==document.getElementById('previewModal'))return;
        document.getElementById('previewModal').classList.remove('show');
        document.getElementById('previewFrame').srcdoc='';
      }

      async function typewriterEffect(bubId,fullText,speed=2){
        const bub=document.getElementById(bubId);
        if(!bub)return;
        let ct='';
        if(fullText.length<60){
          bub.innerHTML=renderMD(fullText);
          const m=document.getElementById('meta-'+bubId);
          if(m)m.style.display='flex';
          smoothScroll();
          return;
        }
        for(let i=0;i<fullText.length;i++){
          if(stopRequested)break;
          ct+=fullText[i];
          bub.innerHTML=renderMD(ct)+'<span class="cursor"></span>';
          if(!isUserScrolledUp)smoothScroll();
          await new Promise(r=>setTimeout(r,speed));
        }
        if(!stopRequested)bub.innerHTML=renderMD(fullText);
        const meta=document.getElementById('meta-'+bubId);
        if(meta)meta.style.display='flex';
        smoothScroll();
      }

      function resetSendBtn(){
        const btn=document.getElementById('sendBtn');
        btn.classList.remove('stop-mode');
        btn.disabled=false;
        btn.onclick=sendMessage;
        btn.innerHTML='<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
      }

      // ======================== SECURED VERCEL API INTERACTION ========================
      async function callVercelAPI(text, mode) {
        // Mengalihkan pemrosesan backend yang aman ke serverless route Vercel
        // API Key disembunyikan sepenuhnya di Vercel Dashboard (client tidak pernah tahu)
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            messages: [{ role: 'user', content: text }],
            mode: mode
          })
        });
        
        if (!response.ok) {
          throw new Error('Gagal menghubungi backend Vercel.');
        }
        const data = await response.json();
        return data.choices?.[0]?.message?.content || data.content || '';
      }

      // ======================== SEND MESSAGE ========================
      async function sendMessage(){
        if(busy)return;
        const inp=document.getElementById('chatInput'),text=inp.value.trim();
        if(!text)return;

        // 🛡️ DETEKSI ANTI-JAILBREAK AKTIF
        if(checkJailbreak(text)){
          inp.value='';inp.style.height='auto';inp.blur();
          ensureActiveChat();
          const chat=getActiveChat();
          const now=getTime();
          chat.msgs.push({role:'user', content:text, time:now});
          saveToLS(); renderHistory();
          appendUserBubble(text, now);

          const jailbreakReply = "Deteksi aktivitas manipulasi sistem sistem keamanan terdeteksi. Akses ditolak.";
          chat.msgs.push({role:'assistant', content:jailbreakReply, time:getTime()});
          saveToLS();
          appendAIBubble(jailbreakReply, getTime(), true, "System Security");
          return;
        }

        inp.value='';inp.style.height='auto';inp.blur();
        busy=true;stopRequested=false;
        
        const sendBtn=document.getElementById('sendBtn');
        sendBtn.disabled=false;sendBtn.classList.add('stop-mode');
        sendBtn.onclick=()=>{stopRequested=true;busy=false;resetSendBtn();};
        sendBtn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>';
        
        const welcome=document.getElementById('welcome');
        if(welcome) welcome.remove();
        
        ensureActiveChat();
        const chat=getActiveChat();
        if(!chat)return;
        if(!chat.title) chat.title=text.length>40?text.slice(0,40)+'…':text;
        
        const now=getTime();
        chat.msgs.push({role:'user',content:text,time:now});
        saveToLS();renderHistory();appendUserBubble(text,now);

        showTyping('Opung AI');
        
        try{
          let responseContent = "";
          try {
            // Coba panggil Vercel API Route yang menyembunyikan API key
            responseContent = await callVercelAPI(text, currentMode);
          } catch(apiErr) {
            // Simulasi tanggapan offline yang dipoles jika dibuka di sandbox lokal / preview non-Vercel
            await new Promise(r=>setTimeout(r,1200));
            if(currentMode === 'coding') {
              responseContent = `Berikut adalah contoh solusi pemrograman bersih dari Opung AI Coding Expert:
\`\`\`javascript
// Dioptimalkan untuk efisiensi eksekusi
const hitungKecepatanData = (jarak, waktu) => {
  if (waktu <= 0) return 0;
  return jarak / waktu;
};
console.log(hitungKecepatanData(100, 2));
\`\`\`
Tautkan website ini ke repository GitHub Anda dan sambungkan di Vercel dengan environment variable \`AGNES_AI_API_KEY\` agar backend terhubung secara otomatis! 🗿`;
            } else if(currentMode === 'deep') {
              responseContent = `### Hasil Analisis DeepSearch Opung AI:
1. **Analisis Konteks**: Topik yang diajukan memerlukan investigasi data yang terstruktur.
2. **Korelasi Sistem**: Pentingnya penyelarasan model backend demi kestabilan runtime.
3. **Konklusi**: Pastikan deployment pada platform Vercel Anda sudah terhubung secara dinamis.`;
            } else {
              responseContent = `Halo! Saya Opung AI, asisten virtual generasi baru. Pertanyaan Anda sangat menarik! Pastikan untuk mengunggah template web ini ke platform hosting pilihan Anda agar fitur cloud database berjalan sempurna. 🗿`;
            }
          }

          hideTyping();
          const aiTime=getTime();
          chat.msgs.push({role:'assistant',content:responseContent,time:aiTime});
          saveToLS();
          const bid=appendAIBubble('',aiTime,true,'Opung AI');
          await typewriterEffect(bid,responseContent,2);
        }
        catch(err){
          hideTyping();
          appendAIBubble('Gagal memproses permintaan: '+esc(err.message),getTime(),true,'Error System');
        }
        
        busy=false;stopRequested=false;resetSendBtn();
      }

      // ======================== INIT SESSIONS ========================
      loadFromLS();renderHistory();renderWelcome();
    </script>
